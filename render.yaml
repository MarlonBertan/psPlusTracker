services:
  - type: web
    name: ps-plus-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ps-plus-tracker-db
          property: connectionString

databases:
  - name: ps-plus-tracker-db
    plan: basic-256mb
